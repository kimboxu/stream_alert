name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if deployment-related files changed
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "변경된 파일 목록:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE \
            '^(lib/|web/|pubspec\.yaml|pubspec\.lock|firebase\.json|\.firebaserc|analysis_options\.yaml)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ 배포 관련 파일 변경 감지됨 → 배포 진행"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ 배포 관련 파일 변경 없음 → 배포 스킵"
          fi

      - name: Set execute permissions for scripts
        if: steps.changes.outputs.changed == 'true'
        run: |
          chmod +x lib/py/bot_manager.sh
          chmod +x lib/py/combined_app_manager.sh
          chmod +x lib/py/my_app_manager.sh

      - name: Setup Flutter
        if: steps.changes.outputs.changed == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'

      - name: Verify Flutter version
        if: steps.changes.outputs.changed == 'true'
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: flutter pub get

      - name: Build Web
        if: steps.changes.outputs.changed == 'true'
        run: |
          ls -la web/
          flutter build web --release \
            --dart-define=BUILD_TIME=$(date +%s) \
            --dart-define=COMMIT_SHA=${{ github.sha }}

      - name: Deploy to Firebase Hosting
        if: steps.changes.outputs.changed == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STREAMALERT_A07D2 }}'
          channelId: live
          projectId: streamalert-a07d2

      - name: Skip notice
        if: steps.changes.outputs.changed == 'false'
        run: |
          echo "================================================"
          echo "⏭️  배포 스킵: 배포에 영향을 주는 파일 변경 없음"
          echo "================================================"