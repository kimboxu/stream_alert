# .github/workflows/firebase-hosting-merge.yml

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 이전 커밋과 비교하기 위해 2개 커밋 히스토리 필요

      # ─────────────────────────────────────────
      # 변경된 파일이 배포에 영향을 주는지 확인
      # ─────────────────────────────────────────
      - name: Check if deployment-related files changed
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "변경된 파일 목록:"
          echo "$CHANGED"

          # 배포에 영향을 주는 경로 패턴
          # lib/, web/, pubspec.yaml, pubspec.lock, firebase.json, .firebaserc 등
          if echo "$CHANGED" | grep -qE \
            '^(lib/|web/|pubspec\.yaml|pubspec\.lock|firebase\.json|\.firebaserc|analysis_options\.yaml)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ 배포 관련 파일 변경 감지됨 → 배포 진행"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ 배포 관련 파일 변경 없음 → 배포 스킵"
          fi

      # ─────────────────────────────────────────
      # 이후 모든 스텝은 변경이 있을 때만 실행
      # ─────────────────────────────────────────
      - name: Set execute permissions for scripts
        if: steps.changes.outputs.changed == 'true'
        run: |
          chmod +x lib/py/bot_manager.sh
          chmod +x lib/py/combined_app_manager.sh
          chmod +x lib/py/my_app_manager.sh

      - name: Setup Flutter
        if: steps.changes.outputs.changed == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'

      - name: Verify Flutter version
        if: steps.changes.outputs.changed == 'true'
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: flutter pub get

      - name: Build Web
        if: steps.changes.outputs.changed == 'true'
        run: |
          ls -la web/
          flutter build web --release

      - name: Deploy to Firebase Hosting
        if: steps.changes.outputs.changed == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STREAMALERT_A07D2 }}'
          channelId: live
          projectId: streamalert-a07d2

      # 변경 없을 때 명시적으로 스킵 메시지 출력
      - name: Skip notice
        if: steps.changes.outputs.changed == 'false'
        run: |
          echo "================================================"
          echo "⏭️  배포 스킵: 배포에 영향을 주는 파일 변경 없음"
          echo "================================================"